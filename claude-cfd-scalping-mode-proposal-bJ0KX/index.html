<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- theme-color matches the Trio icon's Calm teal field
         (Calm v2 --accent, oklch(46% 0.07 200), sRGB #1B6569) -->
    <meta name="theme-color" content="#1B6569" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Paper trading platform on the Alpaca API with real-time market data and portfolio management"
    />

    <!-- Favicons. Order matters: SVG first for crispness, PNGs as fallback. -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />

    <!-- iOS / iPadOS home-screen icon. Single PNG covers iPhone 12 + iPad. -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- PWA manifest (installable app icon, splash colors). -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Trading Platform</title>
    <!-- Theme bootstrap: run before paint so we don't flash the wrong palette. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
    <!-- TradingView Charting Library — served from /public/charting_library/ -->
    <script src="./charting_library/charting_library.standalone.js"></script>
    <script type="module" crossorigin src="./assets/index-Bijywfns.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-VSaZ_ket.css">
  <link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script></head>
  <body>
    <div id="root"></div>
  </body>
</html>
