<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TipRanks widget polish · v0.70</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  /* ─── Tokens (dark theme, lifted from index.css v0.70.0) ─── */
  :root {
    --bg: #0a0c10;
    --panel: #111418;
    --panel-2: #181c22;
    --panel-3: #20262e;
    --border: #1f242c;
    --border-2: #2f3640;
    --hairline: rgba(255, 255, 255, 0.06);
    --text: #e6eaef;
    --text-2: #a8aeb8;
    --mute: #6a6f78;
    --accent: oklch(74% 0.09 200);
    --accent-2: oklch(84% 0.06 200);
    --accent-bg: oklch(74% 0.09 200 / 0.13);
    --pos: oklch(62% 0.14 155);
    --neg: oklch(70% 0.18 25);
    --pos-bg: oklch(62% 0.14 155 / 0.14);
    --neg-bg: oklch(70% 0.18 25 / 0.12);
    --amber: oklch(78% 0.14 75);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
    --r: 10px;
    --r-lg: 14px;
    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color-scheme: dark;
  }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-feature-settings: "ss01", "cv11", "ss03", "calt", "kern";
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-optical-sizing: auto;
    letter-spacing: -0.005em;
  }
  button { font-weight: 550; letter-spacing: -0.008em; font-family: inherit; }

  /* ─── Shared widget shell (matches the v0.70 "p-[18px] + panel + border" base) ─── */
  .tr-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
    padding: 18px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .tr-card-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .tr-symbol {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.01em;
    color: var(--text);
  }
  .tr-widget-kind {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--mute);
    font-weight: 500;
  }

  /* Section label (used inside Sentiment / HedgeFunds / Insiders / etc.) */
  .tr-sec {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--mute);
    font-weight: 400;
  }
  .tr-row {
    border-top: 1px solid var(--border);
    padding: 6px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .tr-row:first-of-type { border-top: 0; }
  .tr-row-label { font-size: 12px; color: var(--mute); }
  .tr-row-value {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .tr-pos { color: var(--pos); }
  .tr-neg { color: var(--neg); }
  .tr-mute { color: var(--mute); }

  /* Action badge (currentColor 12% derived bg — the v0.70 "subtle chip") */
  .tr-badge {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    background: color-mix(in oklab, currentColor 12%, transparent);
    color: currentColor;
    white-space: nowrap;
  }

  /* Star bar (Insiders) — current treatment is plain unicode mute */
  .tr-stars { font-size: 10px; color: var(--mute); font-variant-numeric: tabular-nums; }
  .tr-stars .filled { color: var(--mute); }
  .tr-stars .empty { color: var(--mute); }

  /* Sentiment bar (3-segment) */
  .tr-sbar {
    display: flex;
    height: 8px;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    background: var(--panel-2);
  }

  /* Mini bar for fund portfolio % */
  .tr-fund-bar {
    width: 48px;
    height: 3px;
    background: var(--panel-2);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .tr-fund-bar > div { height: 100%; border-radius: 2px; }

  /* Buy/sell stacked monthly bar (Insiders) */
  .tr-mbar {
    display: flex;
    height: 6px;
    width: 100%;
    border-radius: 3px;
    overflow: hidden;
    background: var(--panel-2);
  }

  /* Pager (CardPager) — generic dot+arrow row */
  .tr-pager {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--mute);
  }
  .tr-pager-arrow {
    width: 22px;
    height: 22px;
    display: grid;
    place-items: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-2);
    cursor: pointer;
    font-size: 12px;
  }
  .tr-pager-arrow:disabled { opacity: 0.35; cursor: default; }

  /* ─── Polish/current display swap ─── */
  .polish-only { display: none !important; }
  .polish .polish-only { display: revert !important; }
  .polish .current-only { display: none !important; }
  /* Per-element overrides where the natural display isn't right */
  .polish .sent-buzz.polish-only { display: inline-block !important; }
  .polish .ar-pt.polish-only { display: inline-block !important; }
  .polish .ar-hit.polish-only { display: inline-flex !important; align-items: center; gap: 6px; }
  .polish .ins-headline.polish-only { display: inline-block !important; }
  .polish .hf-quarters.polish-only { display: flex !important; }
  .polish .rt-cohorts.polish-only { display: inline-flex !important; }
  .polish .hd-delta-arrow.polish-only { display: inline !important; }
  .polish .tr-consensus.polish-only { display: inline-block !important; }

  /* ─── Polish overrides (applied via `.polish` wrapper) ─── */

  /* Universal sweep — applies to ALL 8 widgets */
  .polish .tr-card {
    padding: 16px 18px;
    box-shadow:
      0 0 0 1px var(--hairline),
      0 1px 1px rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
  }

  /* Inner row dividers shift from --border (which feels heavy on dark) to
     --hairline so adjacent rows breathe; section breaks keep --border. */
  .polish .tr-row { border-top-color: var(--hairline); padding: 7px 0; }
  .polish .tr-row.section-break { border-top-color: var(--border); padding-top: 10px; margin-top: 4px; }

  /* Section label: bumped letterspacing + 500 weight + slightly brighter — reads
     more deliberate, less like a stuck-on header */
  .polish .tr-sec {
    font-size: 10.5px;
    letter-spacing: 0.06em;
    font-weight: 500;
    color: color-mix(in oklab, var(--mute) 70%, var(--text-2));
  }

  /* Action badges become proper pills: hairline border in the same tint,
     subtle bg, padded a notch more, slightly more weight. The v0.70 version
     looks like inline text with a tint behind it; this looks like a chip. */
  .polish .tr-badge {
    background: color-mix(in oklch, currentColor 14%, transparent);
    border: 1px solid color-mix(in oklch, currentColor 35%, transparent);
    padding: 2px 7px;
    font-weight: 600;
    letter-spacing: 0.05em;
    border-radius: 999px;
  }

  /* Star bar: amber filled stars, mute hollow. The v0.70 all-mute version
     reads as ASCII art; amber pulls it into the same chrome family as
     other action chips. */
  .polish .tr-stars { font-size: 10.5px; }
  .polish .tr-stars .filled { color: var(--amber); }
  .polish .tr-stars .empty { color: var(--border-2); }

  /* Sentiment bar — slightly taller + subtle inner shadow so it reads as a
     real surface, not a flat divider strip. */
  .polish .tr-sbar {
    height: 9px;
    box-shadow:
      inset 0 1px 0 rgba(0, 0, 0, 0.25),
      inset 0 -1px 0 rgba(255, 255, 255, 0.02);
    border-radius: 5px;
  }

  /* Monthly buy/sell bar (Insiders) — same idea, plus from 6 → 8px height */
  .polish .tr-mbar {
    height: 7px;
    box-shadow:
      inset 0 1px 0 rgba(0, 0, 0, 0.25),
      inset 0 -1px 0 rgba(255, 255, 255, 0.02);
  }

  /* Mini fund bar — slightly taller + better contrast */
  .polish .tr-fund-bar {
    width: 56px;
    height: 4px;
    background: color-mix(in oklch, var(--panel-2) 70%, var(--bg));
  }

  /* Pager arrow: hover lift */
  .polish .tr-pager-arrow:not(:disabled):hover {
    background: var(--panel-2);
    border-color: var(--border-2);
    color: var(--text);
  }

  /* ─── Per-widget polish ─── */

  /* SmartScore — PT moves to a corner chip; score gauge gets a 0-10 rail
     under it. Numbers get more deliberate spacing. */
  .polish .sscore-head {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding-bottom: 6px;
  }
  .polish .sscore-num {
    font-size: 44px;
    line-height: 0.9;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .polish .sscore-pt {
    margin-left: auto;
    align-self: flex-start;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-2);
    background: var(--panel-2);
    border: 1px solid var(--hairline);
    padding: 3px 8px;
    border-radius: 6px;
  }
  /* Gauge rail under the score */
  .polish .sscore-rail {
    position: relative;
    width: 100%;
    height: 4px;
    background: color-mix(in oklch, var(--panel-2) 70%, var(--bg));
    border-radius: 2px;
    margin: 4px 0 2px;
    overflow: hidden;
  }
  .polish .sscore-rail > .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neg), var(--mute) 50%, var(--pos));
    border-radius: 2px;
  }
  .polish .sscore-rail > .tick {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 10px;
    background: var(--text);
    border-radius: 1px;
  }

  /* Sentiment — score line gets a better header treatment */
  .polish .sent-head {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
  }
  .polish .sent-buzz {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-2);
    background: var(--panel-2);
    border: 1px solid var(--hairline);
    padding: 2px 7px;
    border-radius: 999px;
  }
  /* Word cloud chips become proper outlined chips */
  .polish .wc-chip {
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--text-2);
    padding: 2px 8px;
    border-radius: 999px;
  }

  /* AnalystRatings — PT becomes a chip, hit-rate gets a mini bar */
  .polish .ar-pt {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--hairline);
    padding: 2px 7px;
    border-radius: 6px;
  }
  .polish .ar-hit {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .polish .ar-hit-bar {
    width: 28px;
    height: 3px;
    background: var(--panel-2);
    border-radius: 2px;
    overflow: hidden;
  }
  .polish .ar-hit-bar > div { height: 100%; border-radius: 2px; }
  /* "Initiated" badge uses the actual accent, not the text fallback */
  .polish .ar-initiated { color: var(--accent) !important; }

  /* HedgeFunds — bigger signal headline; quarterly Δ as mini bar chart */
  .polish .hf-signal {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .polish .hf-quarters {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    height: 56px;
    margin-top: 4px;
  }
  .polish .hf-q {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 0;
  }
  .polish .hf-q-bar {
    width: 100%;
    background: var(--panel-2);
    border-radius: 3px 3px 0 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
    height: 36px;
    overflow: hidden;
  }
  .polish .hf-q-bar > div {
    border-radius: 3px 3px 0 0;
  }
  .polish .hf-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    padding: 8px 0;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
  }
  .polish .hf-stat {
    padding: 0 12px;
    border-right: 1px solid var(--hairline);
  }
  .polish .hf-stat:last-child { border-right: 0; }
  .polish .hf-stat:first-child { padding-left: 0; }

  /* Insiders — much bigger 12-mo flow headline; richer monthly bars */
  .polish .ins-headline {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .polish .ins-monthly-row {
    display: grid;
    gap: 6px;
  }

  /* RelatedTickers — cohort selector becomes the rail pattern (matches the
     header V4 mode nav idea); rows get a hover state */
  .polish .rt-cohorts {
    display: inline-flex;
    gap: 2px;
    padding: 2px;
    background: var(--panel-2);
    border-radius: 8px;
    align-self: flex-start;
  }
  .polish .rt-cohort {
    font-size: 11px;
    padding: 4px 10px;
    border: 0;
    background: transparent;
    color: var(--text-2);
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
  }
  .polish .rt-cohort.active {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--border);
    font-weight: 600;
  }
  .polish .rt-row { transition: background .12s; padding: 7px 6px; margin: 0 -6px; border-radius: 6px; border-top-color: transparent; }
  .polish .rt-row + .rt-row { border-top: 1px solid var(--hairline); border-radius: 0; }
  .polish .rt-row:hover { background: var(--panel-2); }

  /* HolderDemographics — colored cohort top-borders; delta arrows */
  .polish .hd-cohort {
    padding-top: 8px;
    border-top: 2px solid;
  }
  .polish .hd-cohort.young { border-top-color: color-mix(in oklch, var(--accent) 80%, transparent); }
  .polish .hd-cohort.mid { border-top-color: color-mix(in oklch, var(--mute) 100%, transparent); }
  .polish .hd-cohort.eldest { border-top-color: color-mix(in oklch, var(--amber) 80%, transparent); }
  .polish .hd-delta-arrow { font-size: 9px; margin-right: 2px; opacity: 0.75; }

  /* Trending — consensus gets a subtle chip; rows get hover */
  .polish .tr-consensus {
    background: color-mix(in oklch, currentColor 10%, transparent);
    border: 1px solid color-mix(in oklch, currentColor 25%, transparent);
    color: currentColor;
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .polish .tr-trow { transition: background .12s; padding: 8px 6px; margin: 0 -6px; border-radius: 6px; border-top-color: transparent; }
  .polish .tr-trow + .tr-trow { border-top: 1px solid var(--hairline); border-radius: 0; }
  .polish .tr-trow:hover { background: var(--panel-2); }

  /* ─── Layout ─── */
  .stage {
    max-width: 1480px;
    margin: 0 auto;
    padding: 24px 24px 80px;
  }
  .stage-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .stage-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .stage-sub {
    color: var(--mute);
    font-size: 13px;
    margin-top: 2px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    align-items: start;
  }
  @media (max-width: 1180px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 800px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* Section divider — separates "headline" widgets from "list" widgets */
  .section-h {
    grid-column: 1 / -1;
    margin: 12px 0 -4px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--mute);
    font-weight: 500;
    border-top: 1px solid var(--hairline);
    padding-top: 16px;
  }

  /* Smooth fade on polish toggle so the diff is comfortable to scrub */
  .stage-inner { transition: filter .25s; }

</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tipranks-widgets.jsx"></script>
<script type="text/babel">
const { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakRadio } = window;
const {
  SmartScoreWidget, SentimentWidget, AnalystRatingsWidget, HedgeFundsWidget,
  InsidersWidget, RelatedTickersWidget, HolderDemographicsWidget, TrendingWidget,
} = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "polish": true,
  "showCallouts": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const wrapClass = t.polish ? "stage-inner polish" : "stage-inner";

  return (
    <div className="stage">
      <header className="stage-head">
        <div>
          <div className="stage-title">TipRanks widgets · design polish</div>
          <div className="stage-sub">
            All 8 widgets rendered with AAPL mock data. Toggle the Polish switch in
            the Tweaks panel to A/B compare against the v0.70 baseline.
            No backend, no content, no structure changes — only chrome, type,
            divider, badge, headline, and chip refinements.
          </div>
        </div>
      </header>

      <div className={wrapClass}>
        <div className="grid">
          {/* Headline widgets — composite signals + single-symbol summaries */}
          <SmartScoreWidget callouts={t.showCallouts} />
          <HedgeFundsWidget callouts={t.showCallouts} />
          <InsidersWidget callouts={t.showCallouts} />

          <div className="section-h">List &amp; breakdown widgets</div>

          <AnalystRatingsWidget callouts={t.showCallouts} />
          <SentimentWidget callouts={t.showCallouts} />
          <HolderDemographicsWidget callouts={t.showCallouts} />

          <div className="section-h">Discovery widgets</div>

          <TrendingWidget callouts={t.showCallouts} />
          <RelatedTickersWidget callouts={t.showCallouts} />
        </div>
      </div>

      <TweaksPanel title="Widget polish">
        <TweakSection title="View">
          <TweakToggle
            label="Polish ON"
            hint="Toggle to compare against v0.70 baseline"
            value={t.polish}
            onChange={(v) => setTweak("polish", v)}
          />
          <TweakToggle
            label="Show callouts"
            hint="Annotate each polished change inline"
            value={t.showCallouts}
            onChange={(v) => setTweak("showCallouts", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
