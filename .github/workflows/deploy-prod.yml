name: Deploy production (Vercel)

# Vercel only ever builds on main, so dev branches never consume a Vercel
# preview deployment. The project is created/linked here in CI. The Alpaca
# keys are NOT in GitHub — set them once in the Vercel project settings.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        # Pinned, not @latest: a broken vercel@latest release crashed at
        # "Loading teams…" with `TypeError: Cannot read properties of
        # undefined (reading 'value')`, failing every prod deploy before
        # anything reached Vercel. 53.3.2 is the last version known to
        # deploy this project. Bump deliberately, never float.
        run: npm install -g vercel@53.3.2

      - name: Deploy to production
        run: |
          set -euo pipefail
          # --yes auto-creates and links the project on the first run
          # (project name defaults to the repo directory, "trading-platform").
          url="$(vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "Deployed: $url"
          {
            echo "### Production deployed"
            echo ""
            echo "Deployment URL: $url"
            echo ""
            echo "Stable prod domain: https://trading-platform-five.vercel.app"
            echo ""
            echo "Set the repo **variable** \`VERCEL_PROD_URL\` to the stable"
            echo "domain above so the GitHub Pages dev previews can reach this backend."
            echo "Set the repo **variable** \`VITE_STREAM_BASE\` and the Vercel"
            echo "project Production env var \`VITE_STREAM_BASE\` to the Render"
            echo "relay URL so the frontend streams instead of polling."
          } >> "$GITHUB_STEP_SUMMARY"
