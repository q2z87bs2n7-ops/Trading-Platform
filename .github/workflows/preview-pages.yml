name: Dev preview (GitHub Pages)

# Every dev/claude branch push auto-publishes a static frontend preview to
# the gh-pages branch at
#   https://<owner>.github.io/<repo>/<branch>/
# This is GitHub Pages ONLY — it runs no `vercel` command and cannot
# trigger a Vercel deployment (Vercel git deploys are disabled repo-wide
# via vercel.json git.deploymentEnabled=false; only main → deploy-prod.yml
# reaches Vercel). Each preview talks to the Vercel production backend
# (set the repo variable VERCEL_PROD_URL). Also runnable by hand.
on:
  push:
    branches: ["claude/**"]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ vars.VERCEL_PROD_URL }}
          # Persistent relay (Render) for the real-time SSE stream. If the
          # repo variable is unset the app simply keeps polling.
          VITE_STREAM_BASE: ${{ vars.VITE_STREAM_BASE }}
        run: |
          npm ci
          npm run build
      - name: Slugify branch name
        id: slug
        run: echo "dir=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
      # Assemble the entire gh-pages payload locally and push ONCE. GitHub's
      # built-in pages-build-deployment fires on every push to gh-pages, and
      # two pushes seconds apart race — Pages allows only one active
      # deployment, so the earlier one gets cancelled. We read the existing
      # branch folders straight from the gh-pages ref (no push needed), union
      # in this build's slug, and hand peaceiris a single directory.
      - name: Assemble gh-pages site
        run: |
          set -euo pipefail
          slug='${{ steps.slug.outputs.dir }}'
          existing=""
          if git fetch --no-tags origin gh-pages 2>/dev/null; then
            existing="$(git ls-tree -d --name-only FETCH_HEAD 2>/dev/null || true)"
          fi
          mkdir -p "_site/$slug"
          cp -a frontend/dist/. "_site/$slug/"
          {
            echo '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"><meta http-equiv="expires" content="0">'
            echo '<title>Trading Platform — branch previews</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:48px auto;padding:0 16px;color:#e6edf3;background:#0e1117}h1{font-size:20px}a{display:block;padding:12px 14px;border:1px solid #30363d;border-radius:8px;margin:10px 0;text-decoration:none;color:#58a6ff}a:hover{background:#161b22}</style>'
            echo '</head><body><h1>Branch previews</h1>'
            ( printf '%s\n' "$existing"; echo "$slug" ) \
              | sort -u | while read -r d; do
                [ -n "$d" ] && printf '<a href="./%s/">%s</a>\n' "$d" "$d"
              done
            echo '</body></html>'
          } > _site/index.html
          # Prevent Vercel from attempting a preview deploy of gh-pages: the
          # branch carries no vercel.json so without this Vercel ignores
          # deploymentEnabled=false and errors on every gh-pages push.
          echo '{"git":{"deploymentEnabled":false}}' > _site/vercel.json
      # keep_files preserves the OTHER branch folders (only this slug + the
      # root index/vercel.json are in _site).
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          keep_files: true
