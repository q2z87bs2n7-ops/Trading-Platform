name: Dev preview (GitHub Pages)

# Manual-only. Dev/claude branch pushes intentionally do NOT auto-deploy
# anything — only `main` triggers a deployment (deploy-prod.yml). Run this
# by hand (Actions tab → "Run workflow") on a branch when a static preview
# is actually wanted, at
#   https://<owner>.github.io/<repo>/<branch>/
# Each preview talks to the Vercel production backend (set the repo
# variable VERCEL_PROD_URL to e.g. https://your-app.vercel.app).
on:
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ vars.VERCEL_PROD_URL }}
          # Persistent relay (Render) for the real-time SSE stream. If the
          # repo variable is unset the app simply keeps polling.
          VITE_STREAM_BASE: ${{ vars.VITE_STREAM_BASE }}
        run: |
          npm ci
          npm run build
      - name: Slugify branch name
        id: slug
        run: echo "dir=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          destination_dir: ${{ steps.slug.outputs.dir }}
          keep_files: true
      # Regenerate the root landing page from the live gh-pages contents
      # so every branch preview is listed. The just-published slug is
      # folded in explicitly in case the fetch lags behind that push.
      - name: Build preview index
        run: |
          git fetch --no-tags origin gh-pages || true
          mkdir -p _preview_index
          {
            echo '<!doctype html><html><head><meta charset="utf-8">'
            echo '<title>Trading Platform — branch previews</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:48px auto;padding:0 16px;color:#e6edf3;background:#0e1117}h1{font-size:20px}a{display:block;padding:12px 14px;border:1px solid #30363d;border-radius:8px;margin:10px 0;text-decoration:none;color:#58a6ff}a:hover{background:#161b22}</style>'
            echo '</head><body><h1>Branch previews</h1>'
            ( git ls-tree -d --name-only FETCH_HEAD 2>/dev/null; echo "${{ steps.slug.outputs.dir }}" ) \
              | sort -u | while read -r d; do
                [ -n "$d" ] && printf '<a href="./%s/">%s</a>\n' "$d" "$d"
              done
            echo '</body></html>'
          } > _preview_index/index.html
      - name: Publish preview index
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _preview_index
          destination_dir: .
          keep_files: true
