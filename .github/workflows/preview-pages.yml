name: Dev preview (GitHub Pages)

# Every dev branch gets a static frontend preview at
#   https://<owner>.github.io/<repo>/<branch>/
# and the root URL lists them all. Each preview talks to the Vercel
# production backend (repo variable VERCEL_PROD_URL).
on:
  push:
    branches: ["claude/**"]

# Serialize publishes: every run rewrites the whole gh-pages tree, so
# concurrent runs must not race. Queue them instead of cancelling.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ vars.VERCEL_PROD_URL }}
        run: |
          npm ci
          npm run build

      - name: Slugify branch name
        id: slug
        run: echo "dir=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      # Bring the current gh-pages content so other branches' previews are
      # preserved. continue-on-error covers the first-ever run.
      - name: Check out existing gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: site

      - name: Assemble site
        env:
          SLUG: ${{ steps.slug.outputs.dir }}
        run: |
          set -euo pipefail
          mkdir -p site
          touch site/.nojekyll
          # Replace only this branch's folder (clears stale hashed assets).
          rm -rf "site/$SLUG"
          mkdir -p "site/$SLUG"
          cp -r frontend/dist/. "site/$SLUG/"
          # Regenerate the root index from whatever branch folders exist.
          cd site
          {
            echo '<!doctype html><html><head><meta charset="utf-8">'
            echo '<title>Trading Platform — branch previews</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:48px auto;padding:0 16px;color:#e6edf3;background:#0e1117}h1{font-size:20px}a{display:block;padding:12px 14px;border:1px solid #30363d;border-radius:8px;margin:10px 0;text-decoration:none;color:#58a6ff}a:hover{background:#161b22}</style>'
            echo '</head><body><h1>Branch previews</h1>'
            for d in */; do
              n="${d%/}"
              echo "<a href=\"./$n/\">$n</a>"
            done
            echo '</body></html>'
          } > index.html

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          keep_files: false
          force_orphan: true
