name: Tests

# Runs the unit suites that nothing else does — the frontend vitest tests and
# the backend offline unittest files. Kept separate from the deploy/build path
# so a red test blocks the PR check without coupling to a Vercel/Pages build.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      # Auto-discover every test file, but run each in its OWN process: the
      # files mutate sys.modules at import (stubs/shims), so a shared process
      # would cross-contaminate. Runs all files, then fails if any failed.
      - name: Run backend unit tests
        run: |
          rc=0
          for t in backend/tests/test_*.py; do
            echo "::group::$t"
            python "$t" || rc=1
            echo "::endgroup::"
          done
          exit $rc
