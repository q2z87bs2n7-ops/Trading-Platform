name: Tests

# Runs the unit suites that nothing else does — the frontend vitest tests and
# the backend offline unittest files. Kept separate from the deploy/build path
# so a red test blocks the PR check without coupling to a Vercel/Pages build.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      # Each file is a standalone unittest module that mutates sys.modules at
      # import (stubs/shims), so run them in separate processes to avoid
      # cross-contamination.
      - name: reports CSV builders
        run: python backend/tests/test_reports.py
      - name: screen_assets filters
        run: python backend/tests/test_screen_filters.py
